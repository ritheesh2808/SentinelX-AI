name: Production Certification CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-build-test:
    name: Backend Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: |
          cd backend
          npm ci

      - name: Generate Prisma Client
        run: |
          cd backend
          npx prisma generate

      - name: Build Backend
        run: |
          cd backend
          npm run build

      - name: Run Backend Tests
        run: |
          cd backend
          npm run test

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

  playwright-e2e:
    name: Playwright E2E Production Tests
    runs-on: ubuntu-latest
    needs: [backend-build-test, frontend-build]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: production_acceptance/package-lock.json

      - name: Install Dependencies
        run: |
          cd production_acceptance
          npm ci

      - name: Install Playwright Browsers
        run: |
          cd production_acceptance
          npx playwright install --with-deps chromium

      - name: Run Playwright E2E Tests
        env:
          BASE_URL: https://sentinelx-ai-8rnk.onrender.com
        run: |
          cd production_acceptance
          npx playwright test

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: release_candidate/Version_1_Final_Certification/playwright-report/
          retention-days: 15
